<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OmniCoder Agent</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
--bg:#090909;
--surface:#121212;
--surface2:#171717;
--surface3:#1d1d1d;
--border:rgba(255,255,255,.08);
--accent:#00e887;
--text:#ececec;
--muted:#737373;
--mono:'Geist Mono',monospace;
--ui:'Geist',sans-serif
}

*{
margin:0;
padding:0;
box-sizing:border-box
}

body{
height:100vh;
overflow:hidden;
background:var(--bg);
font-family:var(--ui);
color:var(--text);
display:flex;
flex-direction:column
}

nav{
height:60px;
background:var(--surface);
border-bottom:1px solid var(--border);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px
}

.logo{
font-size:13px;
font-weight:700;
letter-spacing:.14em;
text-transform:uppercase
}

.logo span{
color:var(--accent)
}

.top-actions{
display:flex;
align-items:center;
gap:10px
}

button,select{
height:38px;
border:none;
outline:none;
border-radius:12px
}

button{
padding:0 16px;
font-weight:700;
cursor:pointer
}

.primary{
background:var(--accent);
color:#000
}

.ghost{
background:var(--surface2);
border:1px solid var(--border);
color:var(--text)
}

select{
background:var(--surface2);
border:1px solid var(--border);
padding:0 12px;
color:var(--text)
}

.workspace{
flex:1;
display:grid;
grid-template-columns:320px 1fr 520px;
overflow:hidden
}

.sidebar{
background:var(--surface);
border-right:1px solid var(--border);
display:flex;
flex-direction:column
}

.sidebar-header{
height:44px;
display:flex;
align-items:center;
padding:0 14px;
font-size:11px;
font-weight:700;
letter-spacing:.1em;
text-transform:uppercase;
color:var(--muted);
border-bottom:1px solid var(--border)
}

.sidebar-body{
padding:14px;
display:flex;
flex-direction:column;
gap:12px;
overflow:auto
}

textarea{
width:100%;
resize:none;
outline:none;
border:none;
background:var(--surface2);
border:1px solid var(--border);
border-radius:14px;
padding:14px;
font-family:var(--mono);
font-size:12px;
line-height:1.7;
color:var(--text)
}

#system{
height:220px
}

.chat{
display:flex;
flex-direction:column;
overflow:hidden
}

.messages{
flex:1;
overflow:auto;
padding:18px;
display:flex;
flex-direction:column;
gap:16px
}

.msg{
max-width:900px;
padding:16px;
border-radius:16px;
line-height:1.7;
font-size:14px;
white-space:pre-wrap
}

.user{
align-self:flex-end;
background:#1d1d1d;
border:1px solid var(--border)
}

.assistant{
align-self:flex-start;
background:#101010;
border:1px solid rgba(0,232,135,.18)
}

.composer{
padding:14px;
display:flex;
gap:12px;
border-top:1px solid var(--border);
background:var(--surface)
}

#input{
height:80px;
flex:1
}

.output{
background:var(--surface);
border-left:1px solid var(--border);
display:flex;
flex-direction:column
}

.output-header{
height:44px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 14px;
border-bottom:1px solid var(--border);
font-size:11px;
font-weight:700;
letter-spacing:.1em;
text-transform:uppercase;
color:var(--muted)
}

#code{
flex:1;
border:none;
outline:none;
background:#0f0f0f;
padding:16px;
font-family:var(--mono);
font-size:12px;
line-height:1.7;
color:#dcdcdc;
resize:none
}

.status{
height:24px;
display:flex;
align-items:center;
padding:0 14px;
background:var(--surface);
border-top:1px solid var(--border);
font-size:11px;
font-family:var(--mono);
color:var(--muted)
}

@media(max-width:1200px){
.workspace{
grid-template-columns:1fr
}
.sidebar,.output{
display:none
}
}
</style>
</head>

<body>

<nav>

<div class="logo">
OMNICODER <span>AGENT</span>
</div>

<div class="top-actions">

<select id="model">
<option value="deepseek/deepseek-chat-v3-0324:free">DeepSeek V3</option>
<option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B</option>
<option value="qwen/qwen2.5-coder-32b-instruct:free">Qwen Coder</option>
<option value="google/gemma-2-9b-it:free">Gemma 2</option>
</select>

<button class="ghost" id="clear">
Limpiar
</button>

<button class="primary" id="send">
Enviar
</button>

</div>

</nav>

<div class="workspace">

<div class="sidebar">

<div class="sidebar-header">
System Prompt
</div>

<div class="sidebar-body">

<textarea id="system">
You are OmniCoder, an elite autonomous coding agent.

Rules:
- Produce production-grade code.
- Always optimize architecture.
- Use modern syntax.
- Generate complete files.
- Never explain unless requested.
- Prefer scalable patterns.
- Use advanced UI/UX.
- Generate responsive layouts.
- Include animations when useful.
- Write secure code.
- Minimize redundancy.
- Generate high fidelity interfaces.
</textarea>

</div>

</div>

<div class="chat">

<div class="messages" id="messages"></div>

<div class="composer">

<textarea id="input" placeholder="Escribe una tarea de programación..."></textarea>

</div>

</div>

<div class="output">

<div class="output-header">
Generated Code
</div>

<textarea id="code"></textarea>

</div>

</div>

<div class="status" id="status">
Idle
</div>

<script>
const OPENROUTER_API_KEY="sk-or-v1-TU_API_KEY"

const $=e=>document.querySelector(e)

const messages=$("#messages")
const input=$("#input")
const send=$("#send")
const code=$("#code")
const statusEl=$("#status")
const system=$("#system")
const model=$("#model")

let history=[]

function status(t){

statusEl.textContent=t

}

function add(role,text){

const div=document.createElement("div")

div.className=`msg ${role}`

div.textContent=text

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

}

function extractCode(t){

const match=t.match(/```(?:\w+)?\n([\s\S]*?)```/)

if(match)return match[1]

return t

}

async function ask(){

const text=input.value.trim()

if(!text)return

add("user",text)

history.push({
role:"user",
content:text
})

input.value=""

send.disabled=true

status("Generating...")

try{

const res=await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{
method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+OPENROUTER_API_KEY,
"HTTP-Referer":location.href,
"X-Title":"OmniCoder Agent"
},

body:JSON.stringify({

model:model.value,

messages:[

{
role:"system",
content:system.value
},

...history

],

temperature:.7,
max_tokens:8192

})

}
)

if(!res.ok){

throw new Error(await res.text())

}

const data=await res.json()

const out=data.choices?.[0]?.message?.content||"No response"

add("assistant",out)

history.push({
role:"assistant",
content:out
})

code.value=extractCode(out)

status("Done")

}catch(err){

console.error(err)

add("assistant","ERROR:\n"+err.message)

status("Error")

}finally{

send.disabled=false

}

}

send.onclick=ask

input.addEventListener("keydown",e=>{

if(e.key==="Enter"&&!e.shiftKey){

e.preventDefault()

ask()

}

})

$("#clear").onclick=()=>{

history=[]

messages.innerHTML=""

code.value=""

status("Cleared")

}
</script>

</body>
</html>
