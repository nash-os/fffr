<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vision X-Tract</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0c0c0c;
--surface:#121212;
--surface2:#191919;
--border:rgba(255,255,255,.08);
--accent:#00e887;
--text:#ececec;
--muted:#777;
--mono:'Geist Mono',monospace;
--ui:'Geist',sans-serif
}

*{
margin:0;
padding:0;
box-sizing:border-box
}

body{
background:var(--bg);
color:var(--text);
font-family:var(--ui);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden
}

nav{
height:56px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
background:var(--surface);
border-bottom:1px solid var(--border)
}

.logo{
font-size:13px;
font-weight:700;
letter-spacing:.12em;
text-transform:uppercase
}

.logo span{
color:var(--accent)
}

.controls{
display:flex;
align-items:center;
gap:10px
}

button,input{
height:36px;
border:none;
outline:none;
border-radius:10px
}

input{
width:320px;
padding:0 12px;
background:var(--surface2);
border:1px solid var(--border);
color:var(--text);
font-family:var(--mono);
font-size:12px
}

button{
padding:0 16px;
font-weight:600;
cursor:pointer
}

.primary{
background:var(--accent);
color:#000
}

.ghost{
background:var(--surface2);
border:1px solid var(--border);
color:var(--text)
}

.workspace{
flex:1;
display:grid;
grid-template-columns:420px 1fr;
overflow:hidden
}

.panel{
display:flex;
flex-direction:column;
border-right:1px solid var(--border)
}

.panel:last-child{
border-right:none
}

.header{
height:42px;
display:flex;
align-items:center;
padding:0 14px;
background:var(--surface);
border-bottom:1px solid var(--border);
font-size:11px;
font-weight:700;
letter-spacing:.1em;
text-transform:uppercase;
color:var(--muted)
}

.body{
flex:1;
padding:12px;
overflow:auto;
position:relative
}

#drop{
height:100%;
border:2px dashed rgba(255,255,255,.12);
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:12px;
cursor:pointer;
transition:.2s;
position:relative
}

#drop:hover{
border-color:var(--accent);
background:rgba(0,232,135,.04)
}

#preview{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:contain;
padding:12px;
display:none
}

.drop-text{
font-size:13px;
color:var(--muted);
text-align:center;
line-height:1.6
}

textarea{
width:100%;
height:100%;
resize:none;
outline:none;
border-radius:14px;
border:1px solid var(--border);
background:#101010;
padding:14px;
font-family:var(--mono);
font-size:12px;
line-height:1.7;
color:#d9d9d9
}

#loader{
position:absolute;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.75);
backdrop-filter:blur(4px);
z-index:100
}

.spinner{
width:42px;
height:42px;
border-radius:50%;
border:3px solid rgba(255,255,255,.1);
border-top-color:var(--accent);
animation:spin .7s linear infinite
}

@keyframes spin{
to{
transform:rotate(360deg)
}
}

.status{
height:24px;
display:flex;
align-items:center;
padding:0 14px;
background:var(--surface);
border-top:1px solid var(--border);
font-size:11px;
font-family:var(--mono);
color:var(--muted)
}

.toast{
position:fixed;
left:50%;
bottom:28px;
transform:translateX(-50%);
background:#1b1b1b;
border:1px solid var(--border);
padding:10px 14px;
border-radius:12px;
font-size:12px;
opacity:0;
pointer-events:none;
transition:.2s;
z-index:200
}

.toast.show{
opacity:1
}

@media(max-width:1000px){
.workspace{
grid-template-columns:1fr
}
}
</style>
</head>

<body>

<nav>

<div class="logo">
VISION <span>X-TRACT</span>
</div>

<div class="controls">

<input
id="apikey"
type="password"
placeholder="Pega aquí tu OpenRouter API Key"
>

<button class="ghost" id="clearBtn">
Limpiar
</button>

<button class="primary" id="analyzeBtn">
Analizar
</button>

</div>

</nav>

<div class="workspace">

<div class="panel">

<div class="header">
Imagen
</div>

<div class="body">

<div id="drop">

<img id="preview">

<div class="drop-text">
<strong>Arrastra una imagen</strong><br>
PNG · JPG · WEBP
</div>

<input
type="file"
id="file"
hidden
accept="image/*"
>

</div>

</div>

</div>

<div class="panel">

<div class="header">
Código HTML generado
</div>

<div class="body">

<div id="loader">
<div class="spinner"></div>
</div>

<textarea
id="code"
placeholder="// El HTML generado aparecerá aquí"
></textarea>

</div>

</div>

</div>

<div class="status" id="status">
Idle
</div>

<div class="toast" id="toast"></div>

<script>
let imageBase64=null
let imageMime=null

const $=e=>document.querySelector(e)

const drop=$("#drop")
const file=$("#file")
const preview=$("#preview")
const code=$("#code")
const statusEl=$("#status")
const toast=$("#toast")
const loader=$("#loader")

function showToast(msg){

toast.textContent=msg

toast.classList.add("show")

setTimeout(()=>{
toast.classList.remove("show")
},2500)

}

function setStatus(msg){

statusEl.textContent=msg

}

function loadImage(f){

if(!f.type.startsWith("image/")){

showToast("Archivo inválido")

return

}

const r=new FileReader()

r.onload=e=>{

preview.src=e.target.result

preview.style.display="block"

imageBase64=e.target.result.split(",")[1]

imageMime=f.type

setStatus(`Imagen cargada · ${(f.size/1024).toFixed(0)} KB`)

}

r.readAsDataURL(f)

}

drop.onclick=()=>file.click()

file.onchange=e=>{

if(e.target.files[0]){

loadImage(e.target.files[0])

}

}

drop.addEventListener("dragover",e=>{

e.preventDefault()

drop.style.borderColor="#00e887"

})

drop.addEventListener("dragleave",()=>{

drop.style.borderColor=""

})

drop.addEventListener("drop",e=>{

e.preventDefault()

drop.style.borderColor=""

const f=e.dataTransfer.files[0]

if(f){

loadImage(f)

}

})

async function analyze(){

if(!imageBase64){

showToast("Carga una imagen")

return

}

const apiKey=$("#apikey").value.trim()

if(!apiKey){

showToast("Introduce tu API key")

return

}

loader.style.display="flex"

setStatus("Procesando imagen...")

try{

const prompt=`Analiza esta imagen y devuelve únicamente HTML y CSS altamente fiel visualmente. No uses markdown. No expliques nada.`

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+apiKey,
"HTTP-Referer":location.href,
"X-Title":"Vision X-Tract"
},

body:JSON.stringify({

model:"qwen/qwen2.5-vl-72b-instruct:free",

messages:[{

role:"user",

content:[

{
type:"text",
text:prompt
},

{
type:"image_url",
image_url:{
url:`data:${imageMime};base64,${imageBase64}`
}
}

]

}]

})

})

if(!res.ok){

const err=await res.text()

throw new Error(err)

}

const data=await res.json()

let output=data.choices?.[0]?.message?.content||""

output=output
.replace(/^```html/gm,"")
.replace(/^```/gm,"")
.replace(/```$/gm,"")
.trim()

code.value=output

showToast("Código generado")

setStatus("Completado")

}catch(err){

console.error(err)

showToast("Error API")

setStatus("Error")

}finally{

loader.style.display="none"

}

}

$("#analyzeBtn").onclick=analyze

$("#clearBtn").onclick=()=>{

imageBase64=null

imageMime=null

preview.src=""

preview.style.display="none"

code.value=""

setStatus("Idle")

showToast("Limpiado")

}

</script>

</body>
</html>
