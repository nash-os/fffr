<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vision X-Tract Free</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
--bg:#0c0c0c;
--surface:#111;
--surface2:#161616;
--surface3:#1d1d1d;
--border:rgba(255,255,255,.08);
--accent:#00e887;
--text:#e5e5e5;
--muted:#7a7a7a;
--radius:12px;
--mono:'Geist Mono',monospace;
--ui:'Geist',sans-serif
}
*{margin:0;padding:0;box-sizing:border-box}
body{
background:var(--bg);
color:var(--text);
font-family:var(--ui);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden
}
nav{
height:52px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
border-bottom:1px solid var(--border);
background:var(--surface)
}
.logo{
font-size:13px;
font-weight:700;
letter-spacing:.12em;
text-transform:uppercase
}
.logo span{color:var(--accent)}
.controls{
display:flex;
gap:8px;
align-items:center
}
select,input,button{
height:34px;
border:none;
outline:none;
border-radius:10px;
font-family:var(--ui)
}
select,input{
background:var(--surface2);
border:1px solid var(--border);
color:var(--text);
padding:0 12px
}
button{
padding:0 14px;
cursor:pointer;
font-weight:600
}
.primary{
background:var(--accent);
color:#000
}
.ghost{
background:var(--surface2);
border:1px solid var(--border);
color:var(--text)
}
.workspace{
flex:1;
display:grid;
grid-template-columns:420px 1fr 360px
}
.panel{
display:flex;
flex-direction:column;
border-right:1px solid var(--border);
overflow:hidden
}
.panel:last-child{border-right:none}
.header{
height:40px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 14px;
background:var(--surface);
border-bottom:1px solid var(--border)
}
.header span{
font-size:11px;
letter-spacing:.12em;
text-transform:uppercase;
color:var(--muted);
font-weight:700
}
.body{
flex:1;
padding:12px;
overflow:auto;
position:relative
}
#drop{
height:100%;
border:2px dashed rgba(255,255,255,.15);
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:10px;
cursor:pointer;
position:relative;
transition:.2s
}
#drop:hover{
border-color:var(--accent);
background:rgba(0,232,135,.05)
}
#preview{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:contain;
padding:10px;
display:none
}
.drop-text{
font-size:13px;
color:var(--muted);
text-align:center;
line-height:1.6
}
textarea{
width:100%;
height:100%;
background:#0f0f0f;
border:1px solid var(--border);
border-radius:14px;
padding:14px;
resize:none;
outline:none;
font-family:var(--mono);
font-size:12px;
line-height:1.7;
color:#d6d6d6
}
iframe{
width:100%;
height:100%;
border:none;
border-radius:14px;
background:#fff
}
.status{
height:24px;
display:flex;
align-items:center;
padding:0 14px;
border-top:1px solid var(--border);
background:var(--surface);
font-size:11px;
font-family:var(--mono);
color:var(--muted)
}
.card{
background:var(--surface2);
border:1px solid var(--border);
padding:12px;
border-radius:12px;
margin-bottom:10px
}
.card h4{
font-size:12px;
margin-bottom:6px
}
.card p{
font-size:11px;
line-height:1.6;
color:var(--muted)
}
#loader{
position:absolute;
inset:0;
background:rgba(0,0,0,.75);
display:none;
align-items:center;
justify-content:center;
backdrop-filter:blur(5px);
z-index:50
}
.spin{
width:42px;
height:42px;
border-radius:50%;
border:3px solid rgba(255,255,255,.1);
border-top-color:var(--accent);
animation:spin .7s linear infinite
}
@keyframes spin{
to{transform:rotate(360deg)}
}
.toast{
position:fixed;
left:50%;
bottom:32px;
transform:translateX(-50%);
background:#1b1b1b;
border:1px solid var(--border);
padding:10px 16px;
border-radius:12px;
font-size:12px;
opacity:0;
pointer-events:none;
transition:.2s;
z-index:100
}
.toast.show{
opacity:1
}
@media(max-width:1200px){
.workspace{
grid-template-columns:1fr
}
.panel{
min-height:340px
}
}
</style>
</head>
<body>

<nav>
<div class="logo">VISION <span>X-TRACT</span></div>

<div class="controls">

<select id="provider">
<option value="openrouter">OpenRouter Free</option>
<option value="groq">Groq Free</option>
<option value="together">Together AI</option>
</select>

<input id="apikey" placeholder="API Key">

<button class="ghost" id="clearBtn">Limpiar</button>

<button class="primary" id="analyzeBtn">Analizar</button>

</div>
</nav>

<div class="workspace">

<div class="panel">

<div class="header">
<span>Imagen</span>
</div>

<div class="body">

<div id="drop">

<img id="preview">

<div class="drop-text">
<strong>Arrastra una imagen</strong><br>
PNG · JPG · WEBP
</div>

<input type="file" id="file" hidden accept="image/*">

</div>

</div>

</div>

<div class="panel">

<div class="header">
<span>Código generado</span>
</div>

<div class="body">

<div id="loader">
<div class="spin"></div>
</div>

<textarea id="code" placeholder="// El HTML generado aparecerá aquí"></textarea>

</div>

</div>

<div class="panel">

<div class="header">
<span>Vista previa</span>
</div>

<div class="body">

<iframe id="frame"></iframe>

<div class="card">
<h4>OpenRouter</h4>
<p>Usa modelos free como meta-llama o qwen-vl.</p>
</div>

<div class="card">
<h4>Groq</h4>
<p>Muy rápido para OCR y generación HTML.</p>
</div>

<div class="card">
<h4>Together AI</h4>
<p>Compatible con modelos multimodales open source.</p>
</div>

</div>

</div>

</div>

<div class="status" id="status">
Idle
</div>

<div class="toast" id="toast"></div>

<script>
let imageBase64=null
let imageMime=null

const $=e=>document.querySelector(e)

const drop=$("#drop")
const file=$("#file")
const preview=$("#preview")
const code=$("#code")
const frame=$("#frame")
const statusEl=$("#status")
const toast=$("#toast")
const loader=$("#loader")

function showToast(t){
toast.textContent=t
toast.classList.add("show")
setTimeout(()=>toast.classList.remove("show"),2500)
}

function setStatus(t){
statusEl.textContent=t
}

function loadImage(f){

if(!f.type.startsWith("image/")){
showToast("Archivo inválido")
return
}

const r=new FileReader()

r.onload=e=>{

preview.src=e.target.result
preview.style.display="block"

imageBase64=e.target.result.split(",")[1]
imageMime=f.type

setStatus(`Imagen cargada · ${(f.size/1024).toFixed(0)} KB`)
}

r.readAsDataURL(f)
}

drop.onclick=()=>file.click()

file.onchange=e=>{
if(e.target.files[0])loadImage(e.target.files[0])
}

drop.addEventListener("dragover",e=>{
e.preventDefault()
drop.style.borderColor="#00e887"
})

drop.addEventListener("dragleave",()=>{
drop.style.borderColor=""
})

drop.addEventListener("drop",e=>{
e.preventDefault()
drop.style.borderColor=""
const f=e.dataTransfer.files[0]
if(f)loadImage(f)
})

async function analyze(){

if(!imageBase64){
showToast("Carga una imagen")
return
}

const provider=$("#provider").value
const key=$("#apikey").value.trim()

if(!key){
showToast("Introduce API Key")
return
}

loader.style.display="flex"

try{

let endpoint=""
let headers={}
let body={}

const prompt=`Analiza esta imagen y devuelve únicamente HTML y CSS altamente fiel visualmente. No uses markdown.`

if(provider==="openrouter"){

endpoint="https://openrouter.ai/api/v1/chat/completions"

headers={
"Content-Type":"application/json",
"Authorization":"Bearer "+key
}

body={
model:"qwen/qwen2.5-vl-72b-instruct:free",
messages:[{
role:"user",
content:[
{text:prompt,type:"text"},
{
type:"image_url",
image_url:{
url:`data:${imageMime};base64,${imageBase64}`
}
}
]
}]
}

}

if(provider==="groq"){

endpoint="https://api.groq.com/openai/v1/chat/completions"

headers={
"Content-Type":"application/json",
"Authorization":"Bearer "+key
}

body={
model:"llama-3.2-90b-vision-preview",
messages:[{
role:"user",
content:[
{text:prompt,type:"text"},
{
type:"image_url",
image_url:{
url:`data:${imageMime};base64,${imageBase64}`
}
}
]
}]
}

}

if(provider==="together"){

endpoint="https://api.together.xyz/v1/chat/completions"

headers={
"Content-Type":"application/json",
"Authorization":"Bearer "+key
}

body={
model:"meta-llama/Llama-3.2-90B-Vision-Instruct-Turbo",
messages:[{
role:"user",
content:[
{text:prompt,type:"text"},
{
type:"image_url",
image_url:{
url:`data:${imageMime};base64,${imageBase64}`
}
}
]
}]
}

}

setStatus("Procesando imagen...")

const res=await fetch(endpoint,{
method:"POST",
headers,
body:JSON.stringify(body)
})

if(!res.ok){

const err=await res.text()

throw new Error(err)

}

const data=await res.json()

const output=data.choices?.[0]?.message?.content||""

code.value=output

render()

setStatus("Completado")

showToast("Código generado")

}catch(err){

console.error(err)

showToast("Error API")

setStatus("Error")

}finally{

loader.style.display="none"

}

}

function render(){

const v=code.value.trim()

if(!v)return

frame.srcdoc=v

}

$("#analyzeBtn").onclick=analyze

$("#clearBtn").onclick=()=>{

imageBase64=null
imageMime=null

preview.src=""
preview.style.display="none"

code.value=""

frame.srcdoc=""

setStatus("Idle")

showToast("Limpiado")

}

code.addEventListener("input",render)
</script>

</body>
</html>
