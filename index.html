<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vision X-Tract</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b0b0b;
--surface:#141414;
--surface2:#1b1b1b;
--border:rgba(255,255,255,.08);
--accent:#00e887;
--text:#ededed;
--muted:#777;
--mono:'Geist Mono',monospace;
--ui:'Geist',sans-serif
}

*{
margin:0;
padding:0;
box-sizing:border-box
}

body{
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
background:var(--bg);
color:var(--text);
font-family:var(--ui)
}

nav{
height:56px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
background:var(--surface);
border-bottom:1px solid var(--border)
}

.logo{
font-size:13px;
font-weight:700;
letter-spacing:.14em;
text-transform:uppercase
}

.logo span{
color:var(--accent)
}

.actions{
display:flex;
gap:10px
}

button{
height:36px;
padding:0 16px;
border:none;
border-radius:10px;
font-weight:600;
cursor:pointer
}

.primary{
background:var(--accent);
color:#000
}

.ghost{
background:var(--surface2);
border:1px solid var(--border);
color:var(--text)
}

.workspace{
flex:1;
display:grid;
grid-template-columns:420px 1fr 420px
}

.panel{
display:flex;
flex-direction:column;
border-right:1px solid var(--border)
}

.panel:last-child{
border-right:none
}

.header{
height:42px;
display:flex;
align-items:center;
padding:0 14px;
background:var(--surface);
border-bottom:1px solid var(--border);
font-size:11px;
font-weight:700;
letter-spacing:.1em;
text-transform:uppercase;
color:var(--muted)
}

.body{
flex:1;
padding:12px;
overflow:auto;
position:relative
}

#drop{
height:100%;
border:2px dashed rgba(255,255,255,.12);
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:12px;
cursor:pointer;
transition:.2s;
position:relative
}

#drop:hover{
border-color:var(--accent);
background:rgba(0,232,135,.04)
}

#preview{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:contain;
padding:10px;
display:none
}

.drop-text{
font-size:13px;
color:var(--muted);
text-align:center;
line-height:1.6
}

textarea{
width:100%;
height:100%;
resize:none;
outline:none;
border-radius:14px;
border:1px solid var(--border);
background:#101010;
padding:14px;
font-family:var(--mono);
font-size:12px;
line-height:1.7;
color:#dcdcdc
}

iframe{
width:100%;
height:100%;
border:none;
border-radius:14px;
background:#fff
}

#loader{
position:absolute;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.72);
backdrop-filter:blur(5px);
z-index:100
}

.spinner{
width:44px;
height:44px;
border-radius:50%;
border:3px solid rgba(255,255,255,.1);
border-top-color:var(--accent);
animation:spin .7s linear infinite
}

@keyframes spin{
to{
transform:rotate(360deg)
}
}

.status{
height:24px;
display:flex;
align-items:center;
padding:0 14px;
background:var(--surface);
border-top:1px solid var(--border);
font-size:11px;
font-family:var(--mono);
color:var(--muted)
}

.toast{
position:fixed;
left:50%;
bottom:30px;
transform:translateX(-50%);
background:#1a1a1a;
border:1px solid var(--border);
padding:10px 14px;
border-radius:12px;
font-size:12px;
opacity:0;
pointer-events:none;
transition:.2s;
z-index:300
}

.toast.show{
opacity:1
}

@media(max-width:1200px){
.workspace{
grid-template-columns:1fr
}
}
</style>
</head>

<body>

<nav>

<div class="logo">
VISION <span>X-TRACT</span>
</div>

<div class="actions">

<button class="ghost" id="renderBtn">
Render
</button>

<button class="ghost" id="clearBtn">
Limpiar
</button>

<button class="primary" id="analyzeBtn">
Analizar Imagen
</button>

</div>

</nav>

<div class="workspace">

<div class="panel">

<div class="header">
Imagen
</div>

<div class="body">

<div id="drop">

<img id="preview">

<div class="drop-text">
<strong>Arrastra una imagen</strong><br>
PNG · JPG · WEBP
</div>

<input
type="file"
id="file"
hidden
accept="image/*"
>

</div>

</div>

</div>

<div class="panel">

<div class="header">
Código generado
</div>

<div class="body">

<div id="loader">
<div class="spinner"></div>
</div>

<textarea
id="code"
placeholder="// El HTML generado aparecerá aquí"
></textarea>

</div>

</div>

<div class="panel">

<div class="header">
Vista previa
</div>

<div class="body">

<iframe id="frame"></iframe>

</div>

</div>

</div>

<div class="status" id="status">
Idle
</div>

<div class="toast" id="toast"></div>

<script>
const OPENROUTER_API_KEY="TU_API_KEY_AQUI"

let imageBase64=null
let imageMime=null

const $=e=>document.querySelector(e)

const file=$("#file")
const drop=$("#drop")
const preview=$("#preview")
const code=$("#code")
const frame=$("#frame")
const loader=$("#loader")
const statusEl=$("#status")
const toast=$("#toast")

function showToast(msg){

toast.textContent=msg

toast.classList.add("show")

setTimeout(()=>{
toast.classList.remove("show")
},2500)

}

function setStatus(msg){

statusEl.textContent=msg

}

function loadImage(f){

if(!f.type.startsWith("image/")){

showToast("Archivo inválido")

return

}

const reader=new FileReader()

reader.onload=e=>{

preview.src=e.target.result

preview.style.display="block"

imageBase64=e.target.result.split(",")[1]

imageMime=f.type

setStatus(`Imagen cargada · ${(f.size/1024).toFixed(0)} KB`)

}

reader.readAsDataURL(f)

}

drop.onclick=()=>file.click()

file.onchange=e=>{

if(e.target.files[0]){

loadImage(e.target.files[0])

}

}

drop.addEventListener("dragover",e=>{

e.preventDefault()

drop.style.borderColor="#00e887"

})

drop.addEventListener("dragleave",()=>{

drop.style.borderColor=""

})

drop.addEventListener("drop",e=>{

e.preventDefault()

drop.style.borderColor=""

const f=e.dataTransfer.files[0]

if(f){

loadImage(f)

}

})

async function analyze(){

if(!imageBase64){

showToast("Carga una imagen")

return

}

loader.style.display="flex"

setStatus("Analizando imagen...")

try{

const prompt=`
Analiza esta imagen y genera un HTML visualmente fiel.
Devuelve SOLO código HTML y CSS.
Sin markdown.
Sin explicaciones.
`

const res=await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{
method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+OPENROUTER_API_KEY,
"HTTP-Referer":location.href,
"X-Title":"Vision X-Tract"
},

body:JSON.stringify({

model:"qwen/qwen2.5-vl-72b-instruct:free",

messages:[{

role:"user",

content:[

{
type:"text",
text:prompt
},

{
type:"image_url",
image_url:{
url:`data:${imageMime};base64,${imageBase64}`
}
}

]

}]

})

}
)

if(!res.ok){

const err=await res.text()

throw new Error(err)

}

const data=await res.json()

let output=data.choices?.[0]?.message?.content||""

output=output
.replace(/^```html/gm,"")
.replace(/^```/gm,"")
.replace(/```$/gm,"")
.trim()

code.value=output

render()

showToast("Código generado")

setStatus("Completado")

}catch(err){

console.error(err)

showToast("Error API")

setStatus("Error")

}finally{

loader.style.display="none"

}

}

function render(){

const html=code.value.trim()

if(!html)return

frame.srcdoc=html

}

$("#analyzeBtn").onclick=analyze

$("#renderBtn").onclick=render

$("#clearBtn").onclick=()=>{

imageBase64=null
imageMime=null

preview.src=""
preview.style.display="none"

code.value=""

frame.srcdoc=""

setStatus("Idle")

showToast("Limpiado")

}

code.addEventListener("input",()=>{

render()

})
</script>

</body>
</html>
